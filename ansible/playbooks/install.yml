---
- name: Provisiona o servidor SwingMusic
  hosts: servidor
  become: true
  vars:
    deploy_user: ec2-user
    app_directory: /opt/swingmusic
    compose_plugin_version: v5.3.1
    compose_plugin_arch: x86_64

  tasks:
    - name: Cria arquivo temporário para o RPM
      ansible.builtin.tempfile:
        state: file
        suffix: .rpm
      register: mount_s3_rpm

    - name: Baixa o Mountpoint for Amazon S3
      ansible.builtin.get_url:
        url: https://s3.amazonaws.com/mountpoint-s3-release/latest/x86_64/mount-s3.rpm
        dest: "{{ mount_s3_rpm.path }}"
        mode: "0644"
        force: true ## ISSO CAR****, BAIXA

    - name: Instala o Mountpoint for Amazon S3
      ansible.builtin.command:
        cmd: dnf install -y "{{ mount_s3_rpm.path }}"
      register: dnf_install

    - name: Remove RPM temporário
      ansible.builtin.file:
        path: "{{ mount_s3_rpm.path }}"
        state: absent

    - name: Cria o ponto de montagem das músicas
      ansible.builtin.file:
        path: /opt/musics
        state: directory
        mode: "0755"

    - name: Mantém o bucket S3 montado após reinicializações
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^s3://.* /opt/musics mount-s3 '
        line: 's3://{{ s3_bucket_name }}/ /opt/musics mount-s3 _netdev,nosuid,nodev,rw,allow-other,nofail 0 0'
        create: true

    - name: Monta os filesystems configurados no fstab
      ansible.builtin.command: mount -a
      register: mount_result
      changed_when: false
      failed_when:
        - mount_result.rc != 0
        - "'already mounted' not in mount_result.stderr"

    - name: Instala Docker e dependências
      ansible.builtin.dnf:
        name:
          - docker
        state: present
        
    ## Faz sentido meu nobre
    - name: Cria diretório dos plugins do Docker
      ansible.builtin.file:
        path: /usr/local/lib/docker/cli-plugins
        state: directory
        mode: "0755"

    - name: Instala o plugin Docker Compose para todos os usuários
      ansible.builtin.get_url:
        url: "https://github.com/docker/compose/releases/download/{{ compose_plugin_version }}/docker-compose-linux-{{ compose_plugin_arch }}"
        dest: /usr/local/lib/docker/cli-plugins/docker-compose
        mode: "0755"
        owner: root
        group: root

    - name: Habilita e inicia o Docker
      ansible.builtin.systemd_service:
        name: docker
        enabled: true
        state: started

    - name: Adiciona ec2-user ao grupo docker
      ansible.builtin.user:
        name: "{{ deploy_user }}"
        groups: docker
        append: true

    - name: Reinicia a instância para aplicar o provisionamento
      ansible.builtin.reboot:
        msg: "Reinicialização solicitada pelo playbook de provisionamento"
        reboot_timeout: 10
