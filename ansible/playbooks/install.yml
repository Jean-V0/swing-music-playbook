---
- name: Provisiona o servidor SwingMusic
  hosts: servidor
  become: true
  vars:
    deploy_user: ec2-user
    app_directory: /opt/swingmusic
    compose_plugin_version: v5.1.2
    compose_plugin_arch: x86_64

  tasks:
    - name: Baixa o RPM do Mountpoint for Amazon S3
      ansible.builtin.get_url:
        url: https://s3.amazonaws.com/mountpoint-s3-release/latest/x86_64/mount-s3.rpm
        dest: /tmp/mount-s3.rpm
        mode: "0644"

    - name: Instala o Mountpoint for Amazon S3
      ansible.builtin.dnf:
        name: /tmp/mount-s3.rpm
        state: present

    - name: Remove o RPM temporário do Mountpoint
      ansible.builtin.file:
        path: /tmp/mount-s3.rpm
        state: absent

    - name: Cria o ponto de montagem das músicas
      ansible.builtin.file:
        path: /opt/musics
        state: directory
        mode: "0755"

    - name: Mantém o bucket S3 montado após reinicializações
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^s3://.* /opt/musics mount-s3 '
        line: 's3://{{ s3_bucket_name }}/ /opt/musics mount-s3 _netdev,nosuid,nodev,rw,allow-other,nofail 0 0'
        create: true

    - name: Monta os filesystems configurados no fstab
      ansible.builtin.command: mount -a
      changed_when: false

    - name: Instala Docker e dependências
      ansible.builtin.dnf:
        name:
          - docker
          - curl
        state: present

    - name: Instala o plugin Docker Compose para todos os usuários
      ansible.builtin.get_url:
        url: "https://github.com/docker/compose/releases/download/{{ compose_plugin_version }}/docker-compose-linux-{{ compose_plugin_arch }}"
        dest: /usr/local/lib/docker/cli-plugins/docker-compose
        mode: "0755"
        owner: root
        group: root

    - name: Habilita e inicia o Docker
      ansible.builtin.systemd_service:
        name: docker
        enabled: true
        state: started

    - name: Adiciona ec2-user ao grupo docker
      ansible.builtin.user:
        name: "{{ deploy_user }}"
        groups: docker
        append: true

    - name: Cria diretórios da aplicação e configuração
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"
      loop:
        - "{{ app_directory }}"
        - "{{ app_directory }}/config"

    - name: Publica o Docker Compose do SwingMusic
      ansible.builtin.template:
        src: compose.yml.j2
        dest: "{{ app_directory }}/compose.yml"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0644"

    - name: Confirma que Docker Compose está disponível
      ansible.builtin.command: docker compose version
      changed_when: false

    - name: Inicia o SwingMusic
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ app_directory }}"
      become_user: "{{ deploy_user }}"
      register: swingmusic_up
      changed_when: "'Started' in swingmusic_up.stdout or 'Created' in swingmusic_up.stdout or 'Recreated' in swingmusic_up.stdout"
